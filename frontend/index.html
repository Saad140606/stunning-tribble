<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="Fix Karachi — Report civic issues, track resolutions, and make Karachi better. Built for ZabeFest 2026." />
    <meta name="theme-color" content="#0A1628" />
    <title>Fix Karachi — فکس کراچی</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Noto+Nastaliq+Urdu:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      /* Force mobile layout on all devices */
      html, body {
        max-width: 100%;
        overflow-x: hidden;
        background: #0A1628;
      }

      /* Desktop mobile simulation styles */
      @media (min-width: 768px) {
        body {
          background: #060E1A;
          background-image:
            radial-gradient(ellipse at 20% 50%, rgba(0, 212, 255, 0.06) 0%, transparent 50%),
            radial-gradient(ellipse at 80% 20%, rgba(0, 200, 150, 0.04) 0%, transparent 50%),
            radial-gradient(ellipse at 50% 80%, rgba(255, 107, 53, 0.03) 0%, transparent 50%);
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: flex-start;
          padding: 20px 0;
          position: relative;
          overflow: hidden;
        }

        /* Subtle grid pattern */
        body::before {
          content: '';
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-image:
            linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
          background-size: 60px 60px;
          pointer-events: none;
        }

        /* ZabeFest 2026 Badge */
        body::after {
          content: 'ZabeFest 2026 — Fix Karachi';
          position: fixed;
          top: 30px;
          right: 30px;
          background: linear-gradient(135deg, #00D4FF, #0088AA);
          color: #0A1628;
          padding: 8px 18px;
          border-radius: 20px;
          font-weight: 700;
          font-size: 13px;
          font-family: 'Plus Jakarta Sans', sans-serif;
          box-shadow: 0 4px 20px rgba(0, 212, 255, 0.25);
          z-index: 1000;
          letter-spacing: 0.02em;
        }

        #root {
          max-width: 390px !important;
          width: 390px !important;
          min-height: calc(100vh - 40px);
          background: #0A1628;
          border-radius: 24px;
          box-shadow:
            0 0 0 1px rgba(0, 212, 255, 0.1),
            0 25px 60px rgba(0, 0, 0, 0.6);
          overflow: hidden;
          position: relative;
          z-index: 10;
        }

        /* Mobile device notch */
        #root::before {
          content: '';
          position: absolute;
          top: 0;
          left: 50%;
          transform: translateX(-50%);
          width: 80px;
          height: 4px;
          background: rgba(255, 255, 255, 0.15);
          border-radius: 2px;
          z-index: 9999;
          margin-top: 8px;
        }
      }

      /* Mobile devices */
      @media (max-width: 767px) {
        #root {
          width: 100% !important;
          max-width: 100% !important;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
